<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAMEXUS SERVICES – Home</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- HEADER -->
<div id="header"></div>
<script>
  fetch("partials/header.html")
    .then(r => r.text())
    .then(t => document.getElementById("header").innerHTML = t);
</script>

<!-- PAGE WRAPPER -->
<div class="page-wrapper">

    <section>
        <h2>Welcome to JAMEXUS SERVICES</h2>
        <p>Your home for music, vibes, and digital creativity.</p>
    </section>

    <div class="section-divider"></div>

    <!-- PLAYER + CHAT -->
    <div class="flex-row">

        <!-- PLAYER BOX -->
        <div class="player-box">
            <div class="player-title">Live Radio</div>
            <div class="now-playing" id="nowPlaying">Loading...</div>

            <div class="vinyl-wrapper">
                <div class="tonearm" id="tonearm"></div>
                <div class="needle" id="needle"></div>

                <div class="vinyl" id="vinyl">
                    <div class="vinyl-lines"></div>
                    <div class="vinyl-center"></div>
                    <button class="play-btn" id="playBtn">▶</button>
                </div>
            </div>

            <div class="listener-count" id="listeners">Listeners: 0</div>
        </div>

        <!-- CHAT BOX -->
        <div class="chat-box">
            <div class="chat-title">Live Chat</div>
            <iframe class="chat-frame" src="https://minnit.chat/JAMEXUS?embed&nickname="></iframe>
        </div>

    </div><!-- END flex-row -->

</div><!-- END page-wrapper -->

<div class="section-divider"></div>

<!-- FOOTER -->
<div id="footer"></div>
<script>
  fetch("partials/footer.html")
    .then(r => r.text())
    .then(t => document.getElementById("footer").innerHTML = t);
</script>

<!-- PLAYER SCRIPT -->
<script src="js/player.js"></script>

</body>
</html>
