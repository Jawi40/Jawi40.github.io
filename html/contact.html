<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact – JAMEXUS SERVICES</title>

    <!-- GLOBAL JAMAICAN THEME -->
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<!-- HEADER PARTIAL -->
<div id="header"></div>

<script>
document.addEventListener("DOMContentLoaded", () => {
    fetch(window.location.origin + "/partials/header.html")
        .then(response => {
            if (!response.ok) throw new Error("Header failed to load");
            return response.text();
        })
        .then(html => {
            document.getElementById("header").innerHTML = html;
        })
        .catch(err => {
            console.error("HEADER LOAD ERROR:", err);
        });
});
</script>


<main class="page-wrapper">

    <!-- CONTACT SECTION -->
    <section>
        <h2 class="page-title">Contact Me</h2>

        <p style="text-align:center; max-width:800px; margin:0 auto 20px;">
            If you’d like to connect, collaborate, or ask a question, feel free to reach out anytime.
        </p>

        <p style="text-align:center; font-size:20px;">
            <strong>Email:</strong>
            <span style="color:#fdda24; text-shadow:0 0 8px #009b3a;">
                J_A_W_I@hotmail.com
            </span>
        </p>
    </section>

    <div class="section-divider"></div>

    <!-- SOCIAL LINKS -->
    <section>
        <h2 class="page-title">Social Links</h2>

        <p style="text-align:center; max-width:800px; margin:0 auto 20px;">
            More platforms coming soon as JAMEXUS SERVICES continues to grow.
        </p>
    </section>

    <div class="section-divider"></div>

</main>

<!-- FOOTER PARTIAL -->
<div id="footer"></div>
<script>
  fetch("../partials/footer.html")
    .then(r => r.text())
    .then(t => document.getElementById("footer").innerHTML = t);
</script>

</body>
</html>
