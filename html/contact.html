<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact – JAMEXUS SERVICES</title>

    <!-- GLOBAL JAMAICAN THEME -->
    <link rel="stylesheet" href="../css/style.css">

    <style>
        /* Center the contact button */
        .event-submit-btn {
            display: inline-block;
            margin: 20px auto;
            text-align: center;
        }

        .center {
            text-align: center;
        }
    </style>
</head>

<body>

<!-- HEADER PARTIAL -->
<div id="header"></div>

<script>
document.addEventListener("DOMContentLoaded", () => {
    fetch(window.location.origin + "/partials/header.html")
        .then(response => {
            if (!response.ok) throw new Error("Header failed to load");
            return response.text();
        })
        .then(html => {
            document.getElementById("header").innerHTML = html;
        })
        .catch(err => {
            console.error("HEADER LOAD ERROR:", err);
        });
});
</script>

<script>
function toggleMenu() {
    const menu = document.getElementById("mobile-nav");
    const current = window.getComputedStyle(menu).display;
    menu.style.display = (current === "none") ? "flex" : "none";
}
</script>

<main class="page-wrapper">

    <!-- CONTACT SECTION -->
    <section>
        <h2 class="page-title">Contact Me</h2>

        <p style="text-align:center; max-width:800px; margin:0 auto 20px;">
            If you’d like to connect, collaborate, or ask a question, feel free to reach out anytime.
        </p>

        <!-- CENTERED CONTACT BUTTON -->
        <div class="center">
            <a href="mailto:j_a_w_i@hotmail.com" class="event-submit-btn">
                Contact Jamexus
            </a>
        </div>
    </section>

    <div class="section-divider"></div>

    <!-- SOCIAL LINKS -->
    <section>
        <h2 class="page-title">Social Links</h2>

        <p style="text-align:center; max-width:800px; margin:0 auto 20px;">
            More platforms coming soon as JAMEXUS SERVICES continues to grow.
        </p>
    </section>

    <div class="section-divider"></div>

</main>

<!-- FOOTER PARTIAL -->
<div id="footer"></div>
<script>
  fetch("../partials/footer.html")
    .then(r => r.text())
    .then(t => document.getElementById("footer").innerHTML = t);
</script>

<script>
function toggleMenu() {
    const nav = document.getElementById("mobile-nav");
    nav.classList.toggle("show");
}

function closeMenu() {
    const nav = document.getElementById("mobile-nav");
    nav.classList.remove("show");
}
</script>

</body>
</html>
