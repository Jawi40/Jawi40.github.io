<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Poster Showcase</title>

    <!-- Your unified Jamaican theme stylesheet -->
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

<div class="page-wrapper">

    <!-- HEADER -->
    <header>
        <img src="/images/transparent.png" class="site-logo">
    </header>

    <!-- NAVIGATION -->
    <nav>
        <a href="/index.html">Home</a>
        <a href="/html/services.html">Services</a>
        <a href="/html/event.html">Event Poster Showcase</a>
        <a href="/html/about.html">About</a>
        <a href="/html/contact.html">Contact</a>
        </nav>

    <!-- PAGE TITLE -->
    <section class="event-wrapper">
        <h1 class="page-title">Event Poster Showcase</h1>
        <div class="section-divider"></div>
    </section>

    <!-- SUBMIT POSTER BUTTON -->
    <section class="event-wrapper" style="text-align:center;">
        <a href="mailto:j_a_w_i@hotmail.com" class="event-submit-btn">
            Submit Your Poster
        </a>
        <div class="section-divider" style="margin-top:25px;"></div>
    </section>

    <!-- POSTER GALLERY -->
    <section class="event-wrapper">
        <h2>Poster Gallery</h2>
        <div class="section-divider"></div>

        <div id="gallery" class="gallery"></div>
    </section>

</div>

<!-- AUTO‑LOADING POSTERS -->
<script>
async function loadGallery() {
    const gallery = document.getElementById("gallery");

    try {
        const response = await fetch("/js/posters/list.json");
        const posters = await response.json();

        posters.forEach(file => {
            const img = document.createElement("img");
            img.src = "/js/posters/" + file;
            img.alt = "Event Poster";
            gallery.appendChild(img);
        });

    } catch (error) {
        gallery.innerHTML = "<p style='color:#fdda24;'>Could not load posters. Check list.json.</p>";
    }
}

loadGallery();
</script>

    <!-- FULLSCREEN VIEWER -->
<div id="viewer" style="
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.9);
    backdrop-filter: blur(4px);
    justify-content:center;
    align-items:center;
    z-index:9999;
">
    <img id="viewer-img" src="" style="
        max-width:90%;
        max-height:90%;
        border:3px solid #009b3a;
        box-shadow:0 0 25px #da291c;
        border-radius:10px;
    ">
</div>

<script>
document.addEventListener("click", function(e) {
    if (e.target.tagName === "IMG" && e.target.closest(".gallery")) {
        const viewer = document.getElementById("viewer");
        const viewerImg = document.getElementById("viewer-img");

        viewerImg.src = e.target.src;
        viewer.style.display = "flex";
    }

    // Close viewer when clicking outside the image
    if (e.target.id === "viewer") {
        e.target.style.display = "none";
    }
});
</script>

<!-- UNIVERSAL FULLSCREEN VIEWER -->
<div id="viewer" style="
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.9);
    backdrop-filter: blur(4px);
    justify-content:center;
    align-items:center;
    z-index:9999;
">
    <div id="viewer-content"></div>
</div>

<script>
document.addEventListener("click", function(e) {
    if (e.target.tagName === "IMG" && e.target.closest(".gallery")) {

        const viewer = document.getElementById("viewer");
        const content = document.getElementById("viewer-content");

        const src = e.target.getAttribute("data-src") || e.target.src;

        content.innerHTML = "";

        if (src.match(/\.(jpg|jpeg|png|gif|webp)$/i)) {
            content.innerHTML = `
                <img src="${src}" style="
                    max-width:90%;
                    max-height:90%;
                    border:3px solid #009b3a;
                    box-shadow:0 0 25px #da291c;
                    border-radius:10px;
                ">
            `;
        } 
        else if (src.match(/\.(mp4|webm|mov)$/i)) {
            content.innerHTML = `
                <video controls autoplay style="
                    max-width:90%;
                    max-height:90%;
                    border:3px solid #009b3a;
                    box-shadow:0 0 25px #da291c;
                    border-radius:10px;
                ">
                    <source src="${src}">
                </video>
            `;
        } 
        else if (src.match(/\.(mp3|wav|ogg)$/i)) {
            content.innerHTML = `
                <audio controls autoplay style="
                    width:80%;
                    border:3px solid #009b3a;
                    box-shadow:0 0 25px #da291c;
                    border-radius:10px;
                    background:black;
                    padding:20px;
                ">
                    <source src="${src}">
                </audio>
            `;
        }

        viewer.style.display = "flex";
    }

    if (e.target.id === "viewer") {
        e.target.style.display = "none";
        document.getElementById("viewer-content").innerHTML = "";
    }
});
</script>
    
</body>
</html>
