<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Event Showcase</title>

    <!-- Matches GitHub Pages clean aesthetic -->
    <link rel="stylesheet" href="event.css">
</head>

<body>

<div class="container">

    <header>
        <h1>Event Showcase</h1>
        <p>Browse posters submitted for our community and share your own.</p>

        <!-- Replace with your email or Google Form -->
        <a class="submit-btn" href="mailto:j_a_w_i@hotmial.com">
            Submit Your Poster
        </a>
    </header>

    <section class="gallery-section">
        <h2>Poster Gallery</h2>
        <div id="gallery" class="gallery"></div>
    </section>

</div>

<script>
// Load poster filenames from posters/list.json
async function loadGallery() {
    const gallery = document.getElementById("gallery");

    try {
        const response = await fetch("posters/list.json");
        const posters = await response.json();

        posters.forEach(file => {
            const img = document.createElement("img");
            img.src = "posters/" + file;
            img.alt = "Event Poster";
            gallery.appendChild(img);
        });

    } catch (error) {
        gallery.innerHTML = "<p>Posters could not be loaded. Check list.json.</p>";
    }
}

loadGallery();
</script>

</body>
</html>
