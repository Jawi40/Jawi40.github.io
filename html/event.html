<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Poster Showcase</title>

    <!-- Your unified Jamaican theme stylesheet -->
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

<div class="page-wrapper">

    <!-- HEADER -->
    <header>
        <img src="/images/transparent.png" class="site-logo">
    </header>

    <!-- NAVIGATION -->
    <nav>
        <a href="/index.html">Home</a>
        <a href="/html/services.html">Services</a>
        <a href="/html/event.html">Event Poster Showcase</a>
        <a href="/html/about.html">About</a>
        <a href="/html/contact.html">Contact</a>
        </nav>

    <!-- PAGE TITLE -->
    <section class="event-wrapper">
        <h1 class="page-title">Event Poster Showcase</h1>
        <div class="section-divider"></div>
    </section>

    <!-- SUBMIT POSTER BUTTON -->
    <section class="event-wrapper" style="text-align:center;">
        <a href="mailto:j_a_w_i@hotmail.com" class="event-submit-btn">
            Submit Your Poster
        </a>
        <div class="section-divider" style="margin-top:25px;"></div>
    </section>

    <!-- POSTER GALLERY -->
    <section class="event-wrapper">
        <h2>Poster Gallery</h2>
        <div class="section-divider"></div>

        <div id="gallery" class="gallery"></div>
    </section>

</div>

<!-- AUTO‑LOADING POSTERS -->
<script>
async function loadGallery() {
    const gallery = document.getElementById("gallery");

    try {
        const response = await fetch("/js/posters/list.json");
        const posters = await response.json();

        posters.forEach(file => {
            const img = document.createElement("img");
            img.src = "/posters/" + file;
            img.alt = "Event Poster";
            gallery.appendChild(img);
        });

    } catch (error) {
        gallery.innerHTML = "<p style='color:#fdda24;'>Could not load posters. Check list.json.</p>";
    }
}

loadGallery();
</script>

</body>
</html>
